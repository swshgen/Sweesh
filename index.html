<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Swish Gen">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0f1a">
<title>Swish Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Nunito',sans-serif;background:#070c17;color:#fff;touch-action:none;}

/* ── SCREENS ── */
#screen-form, #screen-preview {
  position:fixed;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:flex-start;
  overflow-y:auto;overflow-x:hidden;
  transition:opacity 0.4s ease, transform 0.4s ease;
}
#screen-form   { z-index:10; background:#070c17; padding:40px 20px 80px; }
#screen-preview{ z-index:5;  background:#070c17; padding:0;
                 align-items:center;justify-content:center; }

#screen-form.hidden   { opacity:0; pointer-events:none; transform:translateY(-30px); }
#screen-preview.hidden{ opacity:0; pointer-events:none; transform:translateY(30px); }

/* ── FORM ── */
.logo { font-size:28px; font-weight:800; letter-spacing:-0.5px; margin-bottom:4px; }
.logo span { color:#8bc34a; }
.tagline { font-size:13px; color:#4a6080; margin-bottom:32px; }

.card {
  width:100%; max-width:400px;
  background:#0d1a2e; border:1px solid #1a2840;
  border-radius:22px; padding:24px 20px 20px;
  margin-bottom:16px;
}
.card-title { font-size:11px; font-weight:700; color:#3a5070;
              text-transform:uppercase; letter-spacing:1px; margin-bottom:18px; }
.field { margin-bottom:14px; }
label { display:block; font-size:11px; font-weight:600; color:#3a6090;
        text-transform:uppercase; letter-spacing:0.8px; margin-bottom:5px; }
input {
  width:100%; background:#070c17; border:1.5px solid #1a2840;
  border-radius:10px; padding:12px 14px; font-size:15px;
  font-family:'Nunito',sans-serif; color:#fff; outline:none;
  transition:border-color 0.2s, box-shadow 0.2s;
}
input:focus { border-color:#7aaa30; box-shadow:0 0 0 3px rgba(122,170,48,0.12); }
input::placeholder { color:#2a3a50; }
.row { display:flex; gap:10px; }
.row .field { flex:1; }

.gen-btn {
  width:100%; max-width:400px;
  background:linear-gradient(135deg,#97d438 0%,#62991a 100%);
  border:none; border-radius:14px; padding:16px;
  font-size:17px; font-weight:800; font-family:'Nunito',sans-serif;
  color:#fff; cursor:pointer; letter-spacing:0.3px;
  box-shadow:0 8px 24px rgba(100,160,40,0.35);
  transition:transform 0.12s, box-shadow 0.12s;
}
.gen-btn:active { transform:scale(0.97); box-shadow:0 4px 12px rgba(100,160,40,0.2); }

/* ── PREVIEW ── */
#screen-preview {
  padding: env(safe-area-inset-top,20px) 0
           env(safe-area-inset-bottom,20px) 0;
}
.phone-outer {
  position:relative;
  width:min(88vw, 360px);
  border-radius:40px;
  overflow:hidden;
  box-shadow:0 24px 64px rgba(0,0,0,0.8), 0 0 0 1.5px #1a2840;
  flex-shrink:0;
}
.phone-outer img.base { width:100%; display:block; pointer-events:none; }

/* text overlays */
.ov { position:absolute; width:100%; text-align:center;
      font-family:'Nunito',sans-serif; pointer-events:none; }
#ov-time   { font-size:clamp(9px,2.8vw,14px);  font-weight:200; color:rgb(160,178,200);
             top:58.0%; transform:translateY(-50%); }
#ov-name   { font-size:clamp(16px,5.2vw,30px); font-weight:500; color:#fff;
             top:62.4%; transform:translateY(-50%); letter-spacing:0.2px; }
#ov-number { font-size:clamp(9px,2.8vw,14px);  font-weight:200; color:rgb(160,178,200);
             top:66.1%; transform:translateY(-50%); }
#ov-amount { font-size:clamp(26px,8.5vw,52px); font-weight:600; color:#fff;
             top:72.7%; transform:translateY(-50%); letter-spacing:-0.5px; }

/* ── BACK BUTTON ── */
#btn-bar {
  position:fixed; bottom:0; left:0; right:0; z-index:20;
  display:none;
  padding:12px 20px calc(12px + env(safe-area-inset-bottom,0px));
  background:rgba(8,13,22,0.92);
  backdrop-filter:blur(14px);
  border-top:1px solid #1a2840;
  gap:10px;
  justify-content:center;
  align-items:center;
}
#btn-bar.visible { display:flex; }
#back-btn {
  flex:1; max-width:140px;
  background:transparent;
  border:1.5px solid #1a2840;
  border-radius:50px;
  padding:11px 18px;
  font-size:14px; font-weight:600;
  font-family:'Nunito',sans-serif;
  color:#7a9ab8; cursor:pointer;
  transition:color 0.2s, border-color 0.2s;
}
#back-btn:active { color:#8bc34a; border-color:#8bc34a; }
#save-btn {
  flex:2; max-width:220px;
  background:linear-gradient(135deg,#97d438,#62991a);
  border:none; border-radius:50px;
  padding:12px 20px;
  font-size:14px; font-weight:700;
  font-family:'Nunito',sans-serif;
  color:#fff; cursor:pointer;
  box-shadow:0 4px 20px rgba(120,200,40,0.45);
  transition:transform 0.12s;
}
#save-btn:active { transform:scale(0.97); }
#fs-btn {
  width:44px; height:44px; flex:0 0 44px;
  background:transparent;
  border:1.5px solid #1a2840;
  border-radius:50%;
  font-size:18px; line-height:1;
  color:#7a9ab8; cursor:pointer;
  transition:color 0.2s, border-color 0.2s;
  display:flex; align-items:center; justify-content:center;
}
#fs-btn:active { color:#8bc34a; border-color:#8bc34a; }

/* iOS pseudo-fullscreen */
.ios-fs {
  position:fixed !important;
  inset:0 !important;
  z-index:999 !important;
  border-radius:0 !important;
  padding:0 !important;
  background:#000 !important;
}
.ios-fs .phone-outer {
  border-radius:0 !important;
  width:100% !important;
  max-width:100% !important;
  height:100vh !important;
  display:flex; align-items:center; justify-content:center;
}
/* ── SPARKLE CANVAS ── */
#sparkle-canvas {
  position:absolute; inset:0;
  pointer-events:none; z-index:10;
  border-radius:40px;
}

/* ── GLOW ring on touch ── */
.phone-outer.glowing {
  box-shadow:0 24px 64px rgba(0,0,0,0.8),
             0 0 0 2px #97d438,
             0 0 50px rgba(150,210,50,0.55);
}
</style>
</head>
<body>

<!-- FORM SCREEN -->
<div id="screen-form">
  <div class="logo">swish<span>✦</span>gen</div>
  <div class="tagline">Build your payment confirmation</div>

  <div class="card">
    <div class="card-title">Recipient</div>
    <div class="field">
      <label>Name</label>
      <input id="inp-name" type="text" placeholder="IK ODEN" value="IK ODEN">
    </div>
    <div class="field">
      <label>Phone Number</label>
      <input id="inp-number" type="text" placeholder="123 441 34 31" value="123 441 34 31">
    </div>
  </div>

  <div class="card">
    <div class="card-title">Payment</div>
    <div class="row">
      <div class="field">
        <label>Amount (kr)</label>
        <input id="inp-amount" type="number" placeholder="75" value="75">
      </div>
      <div class="field">
        <label>Override Time</label>
        <input id="inp-time" type="text" placeholder="Auto">
      </div>
    </div>
  </div>

  <button class="gen-btn" onclick="showPreview()">Generate ✦</button>
</div>

<script>
// ── TIME ──────────────────────────────────────────────
function fmtTime(d){
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const hh=String(d.getHours()).padStart(2,'0');
  const mm=String(d.getMinutes()).padStart(2,'0');
  return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()} at ${hh}:${mm}`;
}
let timeInterval=null;
function startClock(){
  const inp=document.getElementById('inp-time');
  const ov=document.getElementById('ov-time');
  if(inp.value.trim()){ov.textContent=inp.value.trim();return;}
  ov.textContent=fmtTime(new Date());
  clearInterval(timeInterval);
  timeInterval=setInterval(()=>{
    if(!document.getElementById('inp-time').value.trim())
      document.getElementById('ov-time').textContent=fmtTime(new Date());
  },1000);
}

// ── SCREENS ───────────────────────────────────────────

  const amount=document.getElementById('inp-amount').value||'75';
  document.getElementById('ov-name').textContent=name;
  document.getElementById('ov-number').textContent=number;
  document.getElementById('ov-amount').textContent=amount+' kr';
  startClock();
  document.getElementById('screen-form').classList.add('hidden');
  document.getElementById('screen-preview').classList.remove('hidden');
  document.getElementById('btn-bar').classList.add('visible');
  initCanvas();
}
function showForm(){
  clearInterval(timeInterval);
  document.getElementById('screen-preview').classList.add('hidden');
  document.getElementById('screen-form').classList.remove('hidden');
  document.getElementById('btn-bar').classList.remove('visible');
}

// ── SPARKLE SYSTEM ────────────────────────────────────
const canvas=document.getElementById('sparkle-canvas');
const ctx2=canvas.getContext('2d');
let particles=[];
let animFrame=null;

function initCanvas(){
  const phone=document.getElementById('phone');
  canvas.width=phone.offsetWidth;
  canvas.height=phone.offsetHeight;
}
window.addEventListener('resize',initCanvas);

// A sparkle is a 4-pointed star that glitters gold/white/cyan
class Sparkle{
  constructor(x,y,fromDrag){
    this.x=x; this.y=y;
    this.life=1;
    this.decay= fromDrag ? 0.035+Math.random()*0.03 : 0.02+Math.random()*0.02;
    this.size=(fromDrag?2:3)+Math.random()*4;
    this.rotation=Math.random()*Math.PI*2;
    this.rotSpeed=(Math.random()-0.5)*0.18;
    this.vx=(Math.random()-0.5)*1.2;
    this.vy=-Math.random()*2-0.5;
    this.gravity=0.06;
    // golden / white / icy palette
    const palettes=[
      ['#fff','#ffe88a','#ffd700'],
      ['#fff','#c8f0ff','#80d8ff'],
      ['#fff','#fffde0','#ffe066'],
      ['#fff','#f0fff0','#b0ffb0'],
    ];
    this.colors=palettes[Math.floor(Math.random()*palettes.length)];
  }
  update(){
    this.x+=this.vx; this.y+=this.vy;
    this.vy+=this.gravity;
    this.rotation+=this.rotSpeed;
    this.life-=this.decay;
  }
  draw(ctx){
    if(this.life<=0)return;
    ctx.save();
    ctx.globalAlpha=Math.max(0,this.life);
    ctx.translate(this.x,this.y);
    ctx.rotate(this.rotation);

    // 4-pointed star
    const s=this.size*this.life;
    const grad=ctx.createRadialGradient(0,0,0,0,0,s);
    grad.addColorStop(0,  this.colors[0]);
    grad.addColorStop(0.4,this.colors[1]);
    grad.addColorStop(1,  this.colors[2]+'00');
    ctx.fillStyle=grad;

    ctx.beginPath();
    for(let i=0;i<8;i++){
      const angle=i*Math.PI/4;
      const r= i%2===0 ? s : s*0.28;
      i===0 ? ctx.moveTo(Math.cos(angle)*r, Math.sin(angle)*r)
            : ctx.lineTo(Math.cos(angle)*r, Math.sin(angle)*r);
    }
    ctx.closePath();
    ctx.fill();

    // centre bright dot
    ctx.globalAlpha=Math.max(0,this.life)*0.9;
    ctx.beginPath();
    ctx.arc(0,0,s*0.18,0,Math.PI*2);
    ctx.fillStyle='#fff';
    ctx.fill();

    ctx.restore();
  }
  get dead(){ return this.life<=0; }
}

// Ripple ring on tap
class Ripple{
  constructor(x,y){
    this.x=x;this.y=y;this.r=10;this.life=1;
    this.maxR=80;
  }
  update(){ this.r+=3.5; this.life=1-this.r/this.maxR; }
  draw(ctx){
    if(this.life<=0)return;
    ctx.save();
    ctx.globalAlpha=this.life*0.5;
    ctx.strokeStyle='rgba(255,235,120,0.9)';
    ctx.lineWidth=2*(1-this.r/this.maxR)+0.5;
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
    ctx.stroke();
    ctx.restore();
  }
  get dead(){ return this.life<=0; }
}

let ripples=[];

function loop(){
  ctx2.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>p.update());
  particles=particles.filter(p=>!p.dead);
  particles.forEach(p=>p.draw(ctx2));
  ripples.forEach(r=>r.update());
  ripples=ripples.filter(r=>!r.dead);
  ripples.forEach(r=>r.draw(ctx2));
  animFrame=requestAnimationFrame(loop);
}

// start loop once
loop();

function getPos(e,el){
  const rect=el.getBoundingClientRect();
  const src=e.touches?e.touches[0]:e;
  return{x:src.clientX-rect.left, y:src.clientY-rect.top};
}

const phone=document.getElementById('phone');
let pointerDown=false;
let lastTrail=0;

function onStart(e){
  e.preventDefault();
  pointerDown=true;
  phone.classList.add('glowing');
  const pos=getPos(e,phone);
  // burst of sparkles on tap
  for(let i=0;i<14;i++) particles.push(new Sparkle(pos.x,pos.y,false));
  ripples.push(new Ripple(pos.x,pos.y));
}
function onMove(e){
  e.preventDefault();
  if(!pointerDown)return;
  const now=Date.now();
  if(now-lastTrail<30)return;
  lastTrail=now;
  const pos=getPos(e,phone);
  for(let i=0;i<5;i++) particles.push(new Sparkle(pos.x,pos.y,true));
}
function onEnd(){
  pointerDown=false;
  phone.classList.remove('glowing');
}

phone.addEventListener('mousedown',  onStart,{passive:false});
phone.addEventListener('mousemove',  onMove, {passive:false});
phone.addEventListener('mouseup',    onEnd);
phone.addEventListener('mouseleave', onEnd);
phone.addEventListener('touchstart', onStart,{passive:false});
phone.addEventListener('touchmove',  onMove, {passive:false});
phone.addEventListener('touchend',   onEnd);

// ── SAVE IMAGE ────────────────────────────────────────
function saveImage(){
  const btn = document.getElementById('save-btn');
  btn.textContent = 'Saving...';
  btn.disabled = true;

  const phoneEl = document.getElementById('phone');
  const imgEl   = document.getElementById('base-img');
  const natW    = imgEl.naturalWidth;
  const natH    = imgEl.naturalHeight;
  const dispW   = phoneEl.offsetWidth;
  const dispH   = phoneEl.offsetHeight;
  const scaleX  = natW / dispW;
  const scaleY  = natH / dispH;

  const offscreen = document.createElement('canvas');
  offscreen.width  = natW;
  offscreen.height = natH;
  const octx = offscreen.getContext('2d');

  // Wait for Nunito to be ready
  document.fonts.load('500 40px Nunito').then(() => {
    octx.drawImage(imgEl, 0, 0, natW, natH);

    function drawOv(id){
      const el = document.getElementById(id);
      if(!el || !el.textContent.trim()) return;
      const phoneRect = phoneEl.getBoundingClientRect();
      const elRect    = el.getBoundingClientRect();
      const cx = ((elRect.left + elRect.right)  / 2 - phoneRect.left) * scaleX;
      const cy = ((elRect.top  + elRect.bottom) / 2 - phoneRect.top)  * scaleY;
      const computed = window.getComputedStyle(el);
      const fs = parseFloat(computed.fontSize) * scaleX * 1.0;
      const fw = computed.fontWeight;
      octx.font          = fw + ' ' + fs + 'px Nunito, sans-serif';
      octx.fillStyle     = computed.color;
      octx.textAlign     = 'center';
      octx.textBaseline  = 'middle';
      octx.fillText(el.textContent, cx, cy);
    }

    drawOv('ov-time');
    drawOv('ov-name');
    drawOv('ov-number');
    drawOv('ov-amount');

    offscreen.toBlob(blob => {
      btn.textContent = '\u2b07 Save Image';
      btn.disabled = false;
      if(!blob){ alert('Could not generate image.'); return; }
      // On iOS Safari use share sheet to Photos
      if(navigator.share && navigator.canShare){
        const file = new File([blob], 'swish_payment.png', {type:'image/png'});
        if(navigator.canShare({files:[file]})){
          navigator.share({files:[file], title:'Swish Payment'})
            .catch(()=>fallbackDownload(blob));
          return;
        }
      }
      fallbackDownload(blob);
    }, 'image/png');
  });
}

// ── FULLSCREEN ───────────────────────────────────────
function toggleFS(){
  const el = document.getElementById('screen-preview');
  const btn = document.getElementById('fs-btn');
  if(!document.fullscreenElement && !document.webkitFullscreenElement){
    const req = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen;
    if(req){ req.call(el); btn.textContent='✕'; return; }
    // Fallback for iOS which doesn't support Fullscreen API:
    // hide btn-bar temporarily and go edge-to-edge via CSS
    el.classList.add('ios-fs');
    btn.textContent='✕';
    document.getElementById('fs-exit-btn').style.display='block';
  } else {
    const exit = document.exitFullscreen || document.webkitExitFullscreen;
    if(exit) exit.call(document);
    document.getElementById('screen-preview').classList.remove('ios-fs');
    btn.textContent='⛶';
    document.getElementById('fs-exit-btn').style.display='none';
  }
}
document.addEventListener('fullscreenchange', ()=>{
  if(!document.fullscreenElement){
    document.getElementById('fs-btn').textContent='⛶';
    document.getElementById('screen-preview').classList.remove('ios-fs');
    document.getElementById('fs-exit-btn').style.display='none';
  }
});

function fallbackDownload(blob){
  const url  = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href     = url;
  link.download = 'swish_payment.png';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  setTimeout(()=>URL.revokeObjectURL(url), 3000);
}
</script>
